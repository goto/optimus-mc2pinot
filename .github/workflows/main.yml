name: main

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'latest'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - run: mvn package -DskipTests

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - run: mvn test

  release:
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV
          fi

      - name: Set up Java
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Sync pom version with git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: mvn versions:set -DnewVersion=${{ env.IMAGE_TAG }} -DgenerateBackupPoms=false

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: docker.io/gotocompany/optimus-mc2pinot:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

